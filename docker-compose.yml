services:
  config-orchestrator:
    image: src-config-orchestrator:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: config-orchestrator
    restart: unless-stopped
    network_mode: host
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    volumes:
      - ./data:/app/data
      - ./config/config.yml:/app/config/config.yml:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
